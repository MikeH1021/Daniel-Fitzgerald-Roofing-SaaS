name = "roofing-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./public"

[[d1_databases]]
binding = "DB"
database_name = "roofing_calculator"
database_id = "placeholder-replace-before-deploy"
migrations_dir = "drizzle/migrations"

[[r2_buckets]]
binding = "LOGOS_BUCKET"
bucket_name = "roofing-logos"

[[unsafe.bindings]]
name = "ESTIMATE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "LOGIN_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }
